# Rankllms Workflow Frontend Feature Development

## Action

Follow the frontend-feature-development workflow:
1. Edit or create React components in frontend/src/components/
2. Edit or create Astro pages/layouts in frontend/src/pages/ and frontend/src/layouts/
3. Update global styles in frontend/src/styles/global.css
4. Update configuration in frontend/astro.config.mjs, frontend/package.json, or frontend/tsconfig.json
5. Update lock files (frontend/yarn.lock) if dependencies changed

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: frontend/src/components/*.tsx, frontend/src/pages/**/*.astro, frontend/src/layouts/*.astro

